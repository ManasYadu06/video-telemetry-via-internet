# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Nginx RTMP configuration for AWS EC2
# Global Video Telemetry System
#
# Deploy to: /etc/nginx/nginx.conf
# After deploying: sudo nginx -t && sudo systemctl restart nginx
# ─────────────────────────────────────────────────────────────────────────────

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
}

# ─── HTTP block (optional — enables HLS web playback) ────────────────────────
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;

    server {
        listen 80;
        server_name _;

        # ── HLS stream endpoint ──────────────────────────────────────────────
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # ── Web player (index.html) ──────────────────────────────────────────
        location / {
            root /var/www/html;
            index index.html;
        }
    }
}

# ─── RTMP block — core streaming server ──────────────────────────────────────
rtmp {
    server {
        listen 443;
        chunk_size 4096;
        timeout 30s;

        # ── /live — main low-latency RTMP stream ─────────────────────────────
        application live {
            live on;
            record off;

            # Allow publish/play from any IP
            # For production: restrict publish to your Pi's static IP
            # allow publish 1.2.3.4;
            # deny  publish all;
            allow publish all;
            allow play all;

            # Drop stale publisher after 10s of inactivity
            drop_idle_publisher 10s;

            # Push to HLS application simultaneously (uncomment to enable)
            # push rtmp://localhost/hls/stream;
        }

        # ── /hls — HLS transcoding (web browser playback) ────────────────────
        application hls {
            live on;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
            hls_playlist_length 60s;

            # Block direct RTMP playback — use HTTP /hls instead
            deny play all;
        }

        # ── /record — stream + save to disk ──────────────────────────────────
        application record {
            live on;
            record all;
            record_path /var/recordings;
            record_suffix -%Y-%m-%d-%H%M%S.flv;
            record_max_size 500M;
            record_unique on;
        }
    }
}